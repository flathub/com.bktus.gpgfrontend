app-id: com.bktus.gpgfrontend
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
command: gpgfrontend

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=~/.gnupg:rw

cleanup:
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /share/doc
  - /share/gtk-doc
  - /share/man
  - "*.la"
  - "*.a"

modules:
  - name: googletest
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_SHARED_LIBS=ON
    sources:
      - type: git
        url: https://github.com/google/googletest.git
        tag: v1.17.0
        commit: 52eb8108c5bdec04579160ae17225d66034bd723

  - name: pinentry
    buildsystem: autotools
    config-opts:
      - --enable-maintainer-mode
      - --enable-pinentry-qt
      - --disable-pinentry-qt5
      - --disable-pinentry-gnome3
      - --disable-pinentry-gtk2
      - --disable-ncurses
      - --disable-fallback-curses
      - --disable-pinentry-curses
      - --disable-pinentry-emacs
      - --disable-pinentry-fltk
      - --disable-pinentry-tqt
      - --disable-pinentry-tty
      - --disable-libsecret
      - --disable-inside-emacs
    sources:
      - type: archive
        url: https://www.gnupg.org/ftp/gcrypt/pinentry/pinentry-1.3.2.tar.bz2
        sha256: 8e986ed88561b4da6e9efe0c54fa4ca8923035c99264df0b0464497c5fb94e9e

  - name: openssl
    sources:
      - type: archive
        url: https://www.openssl.org/source/openssl-3.6.2.tar.gz
        sha256: aaf51a1fe064384f811daeaeb4ec4dce7340ec8bd893027eee676af31e83a04f
    buildsystem: simple
    build-commands:
      - |
        ./config --prefix=/app \
                 --libdir=lib \
                 shared \
                 '-Wl,-rpath,$(LIBRPATH)'
      - make -j$(nproc)
      - make install_sw
    cleanup:
      - /bin
      - /share/man

  - name: gpgfrontend
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DGPGFRONTEND_USE_SYSTEM_OPENSSL=ON
    sources:
      - type: git
        url: https://github.com/saturneric/GpgFrontend.git
        commit: f863cb01a2ce6659edecacdc0770c93cb130a1cb
