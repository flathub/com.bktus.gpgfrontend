app-id: com.bktus.gpgfrontend
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
command: gpgfrontend

sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=~/.gnupg:rw

cleanup:
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /share/doc
  - /share/gtk-doc
  - /share/man
  - "*.la"
  - "*.a"

modules:
  - name: googletest
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_SHARED_LIBS=ON
    sources:
      - type: git
        url: https://github.com/google/googletest.git
        tag: v1.17.0
        commit: 52eb8108c5bdec04579160ae17225d66034bd723

  - name: pinentry
    buildsystem: autotools
    config-opts:
      - --enable-maintainer-mode
      - --enable-pinentry-qt
      - --disable-pinentry-qt5
      - --disable-pinentry-gnome3
      - --disable-pinentry-gtk2
      - --disable-ncurses
      - --disable-fallback-curses
      - --disable-pinentry-curses
      - --disable-pinentry-emacs
      - --disable-pinentry-fltk
      - --disable-pinentry-tqt
      - --disable-pinentry-tty
      - --disable-libsecret
      - --disable-inside-emacs
    sources:
      - type: archive
        url: https://www.gnupg.org/ftp/gcrypt/pinentry/pinentry-1.3.2.tar.bz2
        sha256: 8e986ed88561b4da6e9efe0c54fa4ca8923035c99264df0b0464497c5fb94e9e

  - name: libsodium
    buildsystem: autotools
    config-opts:
      - --disable-static
      - --enable-shared
    sources:
      - type: archive
        url: https://github.com/jedisct1/libsodium/releases/download/1.0.22-RELEASE/libsodium-1.0.22.tar.gz
        sha256: adbdd8f16149e81ac6078a03aca6fc03b592b89ef7b5ed83841c086191be3349

  - name: gpgfrontend
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_NET_OFFLINE: "true"
        CARGO_HOME: /run/build/gpgfrontend/cargo
    sources:
      - type: git
        url: https://github.com/saturneric/GpgFrontend.git
        commit: e1171cb476a27cbbf7d93e32ee5328b128fcb9f4

      - cargo-sources.json
